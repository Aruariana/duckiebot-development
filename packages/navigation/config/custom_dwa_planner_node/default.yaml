# Custom DWA (Dynamic Window Approach) Planner Configuration
# Lightweight local planner tailored for Duckiebot mono camera constraints

# Robot Kinematic Limits (Duckiebot DB21M specifics)
# These should match the actual motor capabilities of your Duckiebot
max_velocity: 0.4          # Maximum linear velocity (m/s)
max_omega: 1.5             # Maximum angular velocity (rad/s)

# Robot Acceleration Limits (Dynamic Window constraints)
# Defines what velocities are reachable from current velocity
# This is the "Dynamic" in DWA - velocities must be physically reachable
max_accel_v: 0.5           # Maximum linear acceleration (m/s^2)
                           # Constrains velocity samples to: [v_current - max_accel*dt, v_current + max_accel*dt]
max_accel_omega: 2.0       # Maximum angular acceleration (rad/s^2)
                           # Constrains angular velocity samples similarly
                           # Conservative values prevent unrealistic velocity jumps

# Velocity Sampling
# Lower numbers = faster computation, higher numbers = better trajectory quality
velocity_resolution: 5     # Number of linear velocity samples (typical: 3-7)
omega_resolution: 9        # Number of angular velocity samples (typical: 5-15)

# Trajectory Simulation Parameters
prediction_horizon: 1.0    # How far into future to simulate (seconds)
                          # Shorter = more reactive but may miss distant obstacles
                          # Longer = more predictive but slower computation
simulation_dt: 0.1         # Timestep for trajectory simulation (seconds)
                          # Smaller = more accurate simulation but slower
                          # Larger = faster but may skip obstacles

# Cost Function Weights
# These tune how much each objective influences the final decision.
# Weights are normalized so total cost makes sense in [0, inf) range.
# Higher weight = higher importance
weight_path: 1.0           # Following global path importance
weight_velocity: 0.1       # Preference for forward motion (prevent stalling)
weight_obstacle: 10.0      # Avoidance of obstacles (CRITICAL - must be high!)
weight_heading: 0.05       # Smooth heading changes (prevents jerky turns)

# Planning Rate
# The planner runs at this frequency (set in code as 10 Hz / 0.1s timer)
# Affects responsiveness and computational load
# 10 Hz is a good balance for Duckiebot limited compute

# Obstacle Avoidance Strategy
# The planner uses a repulsive potential field approach:
# - Distance to obstacle is checked at each trajectory point
# - If any point penetrates the obstacle radius (including safety margin), trajectory is rejected
# - Otherwise, cost increases inversely with distance (closer = more expensive)
# This ensures safety-critical collision avoidance while allowing near-optimal planning

# Path Following Strategy
# Global path is provided as a sequence of waypoints
# Cost function evaluates lateral deviation from path
# Encourages lane-following behavior while reactively avoiding dynamic obstacles
# ===== DYNAMIC WINDOW EXPLANATION =====
# The DWA algorithm uses a "dynamic window" to constrain velocity sampling.
# Instead of sampling all velocities from 0 to max_velocity every cycle,
# we only sample velocities reachable from the current velocity given acceleration limits.
#
# This ensures:
# 1. Physically realistic velocity commands (no impossible instant jumps)
# 2. Smoother trajectory changes (gradual acceleration/deceleration)
# 3. Better obstacle avoidance (more time to react by changing velocities gradually)
#
# Example: If current_v=0.2 m/s, max_accel_v=0.5 m/s², dt=0.1s:
#   - Reachable velocities: [max(0, 0.2-0.05), min(0.4, 0.2+0.05)]
#   - Only [0.15, 0.25] m/s will be sampled (instead of [0, 0.4])
#
# Tune max_accel_v and max_accel_omega based on your Duckiebot's actual capabilities
# from motor response tests or manufacturer specs.